name: Traffic Light PR Automation

on:
  pull_request:
    types: [labeled, opened, synchronize]

jobs:
  traffic-handle:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      
    steps:
      # --- RED LIGHT: Request Review ---
      # Automatically requests a review from the repository owner or specific team
      - name: Request Review for Red Light
        if: contains(github.event.pull_request.labels.*.name, 'red-light')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            github.rest.pulls.requestReviewers({
              owner: owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: [owner] // By default, requests review from repo owner
            })

      # --- GREEN LIGHT: Auto-Merge ---
      # Automatically enables the native GitHub Auto-Merge feature
      - name: Enable Auto-Merge for Green Light
        if: contains(github.event.pull_request.labels.*.name, 'green-light')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const query = `
                mutation($projectId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $projectId,
                    mergeMethod: MERGE
                  }) {
                    pullRequest { autoMergeRequest { enabledAt } }
                  }
                }`;
              const variables = {
                projectId: context.payload.pull_request.node_id
              };
              await github.graphql(query, variables);
              console.log("Auto-merge enabled for Green Light PR");
            } catch (error) {
              console.error("Failed to enable auto-merge. Ensure 'Allow auto-merge' is enabled in Repo Settings.");
            }
