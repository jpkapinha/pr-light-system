name: Traffic Light PR Automation

on:
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened]

jobs:
  # --- SAFETY CATCH: Label Validation ---
  # This job ensures the PR has a valid traffic light label before any merge.
  validate-labels:
    name: Check for Traffic Light Label
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR has a valid label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const validLabels = ['red-light', 'green-light', 'yellow-light'];
            const hasValidLabel = labels.some(label => validLabels.includes(label));
            
            if (!hasValidLabel) {
              core.setFailed(`🛑 This PR is missing a Traffic Light label! Please add one of: ${validLabels.join(', ')}`);
            } else {
              console.log("✅ Valid traffic light label detected.");
            }

  # --- AUTOMATION LOGIC ---
  traffic-handle:
    name: Handle Traffic Light
    needs: validate-labels
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      
    steps:
      # --- RED LIGHT: Request Review ---
      - name: Request Review for Red Light
        if: contains(github.event.pull_request.labels.*.name, 'red-light')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            github.rest.pulls.requestReviewers({
              owner: owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: [owner]
            })

      # --- GREEN LIGHT: Auto-Merge ---
      - name: Enable Auto-Merge for Green Light
        if: contains(github.event.pull_request.labels.*.name, 'green-light')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const query = `
                mutation($projectId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $projectId,
                    mergeMethod: MERGE
                  }) {
                    pullRequest { autoMergeRequest { enabledAt } }
                  }
                }`;
              const variables = {
                projectId: context.payload.pull_request.node_id
              };
              await github.graphql(query, variables);
              console.log("Auto-merge enabled for Green Light PR");
            } catch (error) {
              console.log("Auto-merge not enabled. Ensure 'Allow auto-merge' is enabled in Repo Settings.");
            }
